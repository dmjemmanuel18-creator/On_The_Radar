<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - On The Radar</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="signin.css">
</head>

<body class="signin-page">
    <img class="page-background"
        src="https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb?auto=format&fit=crop&q=80"
        alt="Fashionable clothing on display">

    <header class="signin_header">
        <a href="../index.html" class="logo" style="text-decoration: none;">OTR</a>
        <nav class="nav user-nav" aria-label="User Navigation">
            <div class="liquid-bubble"></div>
            <a href="../signup/signup.html">Register</a>
        </nav>
    </header>

    <main class="signin-content-wrapper">
        <div class="signin-text-panel">
            <div class="fashion-tag">
                <span>Timeless Style</span>
            </div>
            <div class="image-overlay-content">
                <a href="../index.html" class="logo">OTR</a>
                <p class="statement-text">Style that speaks for itself.</p>
            </div>
        </div>

        <div class="signin-container">
            <h1>Welcome Back</h1>
            <p class="subtitle">Sign in to continue your OTR experience.</p>

            <form class="signin-form" action="#" method="POST">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="signin-button">Sign In</button>
            </form>

            <div class="divider"><span>OR</span></div>

            <a href="#" class="google-signin-button">
                <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                    <path fill="#EA4335"
                        d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z">
                    </path>
                    <path fill="#4285F4"
                        d="M46.98 24.55c0-1.57-.15-3.09-.42-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z">
                    </path>
                    <path fill="#FBBC05"
                        d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z">
                    </path>
                    <path fill="#34A853"
                        d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z">
                    </path>
                    <path fill="none" d="M0 0h48v48H0z"></path>
                </svg>
                <span>Sign in with Google</span>
            </a>

            <p class="switch-method-link">
                New here? <a href="../signup/signup.html">Create an account</a>
            </p>
        </div>
    </main>

    <script type="module" src="../script.js"></script>
    <script type="module" src="signin.js"></script>
</body>

</html>
