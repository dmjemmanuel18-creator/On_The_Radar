<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - On The Radar</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="signup.css">
</head>

<body class="signup-page">
    <img class="page-background"
        src="https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb?auto=format&fit=crop&q=80"
        alt="Fashionable clothing on display">
    <header class="signup_header">
        <a href="../index.html" class="logo" style="text-decoration: none;">OTR</a>
        <nav class="nav user-nav" aria-label="User Navigation">
            <div class="liquid-bubble"></div>
            <a href="#">Login</a>
            <a href="#" class="cart-link" aria-label="Shopping Cart">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
            </a>
        </nav>
    </header>

    <main class="signup-content-wrapper">
        <div class="signup-text-panel">
            <div class="fashion-tag">
                <span>Timeless Style</span>
            </div>
            <div class="image-overlay-content">
                <a href="../index.html" class="logo">OTR</a>
                <p class="statement-text">Style that speaks for itself.</p>
            </div>
        </div>

        <div class="signup-container">
            <h1>Create Your Account</h1>
            <p class="subtitle">Join the OTR community to get started.</p>

            <div id="email-signup-section">
                <form class="signup-form" action="#" method="POST">
                    <div class="form-group">
                        <label for="fullname">Full Name</label>
                        <input type="text" id="fullname" name="fullname" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" minlength="8" required
                            placeholder="At least 8 characters">
                    </div>
                    <button type="submit" class="signup-button">Create Account</button>
                </form>

                <div class="divider"><span>OR</span></div>

                <a href="#" class="google-signup-button">
                    <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                        <path fill="#EA4335"
                            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z">
                        </path>
                        <path fill="#4285F4"
                            d="M46.98 24.55c0-1.57-.15-3.09-.42-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z">
                        </path>
                        <path fill="#FBBC05"
                            d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z">
                        </path>
                        <path fill="#34A853"
                            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z">
                        </path>
                        <path fill="none" d="M0 0h48v48H0z"></path>
                    </svg>
                    <span>Sign up with Google</span>
                </a>
                <p class="switch-method-link"><a href="#" id="show-phone-signup">Sign up with phone number</a></p>
            </div>

            <div id="phone-signup-section" style="display: none;">
                <form class="phone-signup-form" action="#" method="POST">
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" required placeholder="e.g. +1 555-555-5555">
                    </div>
                    <button type="submit" class="signup-button">Send Verification Code</button>
                </form>
                <p class="switch-method-link"><a href="#" id="show-email-signup">Back to email signup</a></p>
            </div>

            <p class="login-link">
                Already have an account? <a href="#">Log In</a>
            </p>
        </div>
    </main>

    <script src="../script.js"></script>
    <script src="signup.js"></script>
</body>

</html>
