<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - On The Radar</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="shop.css">
</head>

<body>
    <header>
        <a href="../index.html" class="logo">OTR</a>
        <button class="mobile-menu-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false"
            aria-controls="mobile-nav-panel">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div id="mobile-nav-panel" class="mobile-nav-panel">
            <nav class="nav main-nav" aria-label="Main Navigation">
                <div class="liquid-bubble"></div>
                <a href="../index.html#contact">Contact</a>
            </nav>
            <nav class="nav user-nav" aria-label="User Navigation">
                <div class="liquid-bubble"></div>
                <a href="../signin/signin.html" class="logged-in">Login</a>
                <a href="../signup/signup.html" class="signup-link">Register</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="shop-hero">
            <div class="shop-hero-content">
                <h1>Our Collection</h1>
                <p>Timeless staples for the modern wardrobe. Curated silhouettes and elevated textures.</p>
            </div>
        </section>

        <section class="shop-products">
            <div class="filter-container">
                <button class="filter-button active" data-category="all">All</button>
                <button class="filter-button" data-category="t-shirts">T-Shirts</button>
                <button class="filter-button" data-category="sweatpants">Sweatpants</button>
                <button class="filter-button" data-category="hoodies">Hoodies</button>
                <button class="filter-button" data-category="jackets">Jackets</button>
                <button class="filter-button" data-category="footwear">Footwear</button>
                <button class="filter-button" data-category="accessories">Accessories</button>
            </div>
            <div class="product-grid">
                <!-- Products will be dynamically injected here -->
            </div>
        </section>

        <section id="contact" class="contact">
            <div class="about">
                <div class="about-text">
                    <h2>On The Radar</h2>
                    <p>Style that speaks for itself.</p>
                </div>
                <div class="contact-div">
                    <p>Reach out to us on our different platforms.</p>
                    <div class="contact-buttons-container">
                        <a href="#" class="whatsapp contact-button" aria-label="WhatsApp">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.894 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01s-.521.074-.792.372c-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.626.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z" />
                            </svg>
                        </a>
                        <a href="#" class="instagram contact-button" aria-label="Instagram">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                            </svg>
                        </a>
                        <a href="#" class="tiktok contact-button" aria-label="TikTok">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="24" height="24"
                                fill="currentColor">
                                <path
                                    d="M9 0h1.98c.144.715.54 1.617 1.235 2.512C12.895 3.389 13.797 4 15 4v2c-1.753 0-3.07-.814-4-1.829V11a5 5 0 1 1-5-5v2a3 3 0 1 0 3 3z" />
                            </svg>
                        </a>
                        <a href="#" class="twitter contact-button" aria-label="Twitter">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
                            </svg>
                        </a>
                    </div>
                </div>
            </div>
            <footer>
                <p>&copy; 2026 On The Radar. All rights reserved.</p>
            </footer>
        </section>
    </main>
    <a href="#" class="floating-cart-button" aria-label="Shopping Cart" hidden>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
    </a>
    
    <script type="module" src="../firebase-init.js"></script>
    <script type="module" src="../script.js"></script>
    <script type="module" src="shop.js"></script>
</body>

</html>
